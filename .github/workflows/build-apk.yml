name: Build APK (Debug)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Build web app
        run: pnpm build

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -keypass android -storepass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"

      - name: Build APK with Capacitor
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=../debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: starworld-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
